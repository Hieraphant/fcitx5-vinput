app-id: org.fcitx.Fcitx5.Addon.Vinput
branch: stable
runtime: org.fcitx.Fcitx5
runtime-version: stable
sdk: org.kde.Sdk//6.10
build-extension: true
separate-locales: false
build-options:
  prefix: /app/addons/Vinput
  prepend-pkg-config-path: /app/addons/Vinput/lib/pkgconfig
  no-debuginfo: true
  strip: true
cleanup:
  - /include
  - "*.la"
  - "*.a"
  - /lib/cmake
  - /lib/pkgconfig
modules:
  - name: sherpa-onnx
    buildsystem: simple
    build-commands:
      - install -d ${FLATPAK_DEST}/lib ${FLATPAK_DEST}/include/sherpa-onnx/c-api
      - install -m 755 lib/*.so ${FLATPAK_DEST}/lib/
      - install -m 644 include/sherpa-onnx/c-api/*.h ${FLATPAK_DEST}/include/sherpa-onnx/c-api/
    sources:
      - type: archive
        url: https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.28/sherpa-onnx-v1.12.28-linux-x64-shared-no-tts.tar.bz2
        sha256: 4f1ad4ba5c80271f55b1ec6f0a93083aa1588a86ab1491153e48064f4ed3870b
  - name: fcitx5-vinput
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../../
