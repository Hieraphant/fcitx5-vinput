name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source_archive:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      package_release: ${{ steps.meta.outputs.package_release }}
      source_archive: ${{ steps.meta.outputs.source_archive }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "Release tags must start with v" >&2
            exit 1
          fi

          echo "package_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_release=1" >> "${GITHUB_OUTPUT}"
          echo "source_archive=fcitx5-vinput-${version}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Create source archive
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/create-source-archive.sh \
            "dist/${{ steps.meta.outputs.source_archive }}" \
            "${{ steps.meta.outputs.package_version }}" \
            "${GITHUB_WORKSPACE}"

      - uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: dist/${{ steps.meta.outputs.source_archive }}
          if-no-files-found: error

  build-linux-tarball:
    needs: source_archive
    strategy:
      fail-fast: false
      matrix:
        runtime_mode: [system, bundled]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./scripts/ci-install-build-deps.sh ubuntu24.04

      - uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: dist

      - name: Install sherpa-onnx build runtime
        run: |
          prefix="${RUNNER_TEMP}/sherpa-onnx-install"
          tar -xf "dist/${{ needs.source_archive.outputs.source_archive }}"
          source "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/sherpa-onnx-vars.sh"
          bash "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}/scripts/build-sherpa-onnx.sh" \
            "${SHERPA_ONNX_VERSION}" "${prefix}"
          echo "VINPUT_CMAKE_PREFIX_PATH=${prefix}" >> "${GITHUB_ENV}"

      - name: Configure
        run: |
          cmake -S "fcitx5-vinput-${{ needs.source_archive.outputs.package_version }}" -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_PREFIX_PATH="${VINPUT_CMAKE_PREFIX_PATH}" \
            -DVINPUT_PROJECT_VERSION="${{ needs.source_archive.outputs.package_version }}" \
            -DVINPUT_PACKAGE_RELEASE="${{ needs.source_archive.outputs.package_release }}" \
            -DVINPUT_PACKAGE_HOMEPAGE_URL="${{ github.server_url }}/${{ github.repository }}" \
            -DVINPUT_RUNTIME_MODE="${{ matrix.runtime_mode }}"

      - name: Build
        run: cmake --build build

      - name: Package tarball
        shell: bash
        run: |
          version="${{ needs.source_archive.outputs.package_version }}"
          release="${{ needs.source_archive.outputs.package_release }}"
          mode="${{ matrix.runtime_mode }}"
          stage_root="${RUNNER_TEMP}/stage"
          archive_root="fcitx5-vinput_${version}-${release}_linux_x86_64_${mode}"

          rm -rf "${stage_root}" dist/release
          mkdir -p "${stage_root}" dist/release
          DESTDIR="${stage_root}" cmake --install build
          mv "${stage_root}/usr" "dist/release/${archive_root}"
          tar -C dist/release -czf "dist/${archive_root}.tar.gz" "${archive_root}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ matrix.runtime_mode }}
          path: dist/fcitx5-vinput_*_linux_x86_64_${{ matrix.runtime_mode }}.tar.gz
          if-no-files-found: error

  publish-release:
    needs:
      - source_archive
      - build-linux-tarball
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          args: --latest --strip header

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish assets to GitHub Release
        shell: bash
        run: |
          mkdir -p release
          find release-artifacts -type f -exec cp {} release/ \;

          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" \
              --notes "${{ steps.changelog.outputs.content }}"
          fi

          gh release upload "${GITHUB_REF_NAME}" --repo "${GH_REPO}" release/* --clobber
