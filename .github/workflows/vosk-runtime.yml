name: vosk-runtime

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu24.04
            image: ubuntu:24.04
            target: ubuntu24.04
            cc: clang
            cxx: clang++
          - name: debian12
            image: debian:12
            target: debian12
            cc: clang
            cxx: clang++
          - name: opensuse-leap
            image: registry.opensuse.org/opensuse/leap:15.6
            target: opensuse-leap
            cc: clang-17
            cxx: clang++-17
          - name: flatpak-kde6.10
            image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
            target: flatpak-kde6.10
            cc: clang
            cxx: clang++
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    name: ${{ matrix.name }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Prepare container prerequisites
        if: ${{ matrix.target == 'opensuse-leap' }}
        shell: bash
        run: |
          zypper --gpg-auto-import-keys --non-interactive refresh
          zypper --non-interactive install --no-recommends \
            gzip \
            tar

      - uses: actions/checkout@v6

      - name: Install build dependencies
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            opensuse-leap)
              zypper --non-interactive addrepo --refresh \
                https://download.opensuse.org/repositories/devel:/tools:/compiler/15.6/ \
                devel-tools-compiler
              zypper --gpg-auto-import-keys --non-interactive refresh
              zypper --non-interactive install --no-recommends \
                clang17 \
                cmake \
                curl \
                gcc-c++ \
                git \
                jq \
                lapack-devel \
                libarchive-devel \
                libopenssl-devel \
                make \
                mold \
                ninja \
                openblas-devel \
                patch \
                pipewire-devel \
                python3 \
                systemd-devel \
                zstd
              ;;
            flatpak-kde6.10)
              apt-get update
              apt-get install -y \
                bzip2 \
                clang \
                cmake \
                curl \
                file \
                git \
                jq \
                make \
                mold \
                ninja-build \
                patch \
                pkg-config \
                python3 \
                zstd \
                libarchive-dev \
                libblas-dev \
                liblapack-dev \
                libopenblas-dev \
                libssl-dev
              ;;
            *)
              ./scripts/ci-install-build-deps.sh "${{ matrix.target }}"
              ;;
          esac

      - name: Check Kaldi patch headers
        run: bash scripts/check-kaldi-openfst-patch.sh

      - name: Check Vosk build script
        run: bash scripts/check-vosk-build-script.sh

      - name: Check Kaldi build flags
        run: bash scripts/check-kaldi-build-flags.sh

      - name: Build Vosk runtime
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          prefix="${GITHUB_WORKSPACE}/runtime"
          bash scripts/build-vosk-from-source.sh "" "${prefix}"

      - name: Package Vosk runtime
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/package-vosk-runtime.sh \
            "${{ matrix.target }}" \
            "${GITHUB_WORKSPACE}/runtime" \
            "${GITHUB_WORKSPACE}/dist"

      - name: Resolve artifact names
        id: runtime_vars
        shell: bash
        run: |
          source scripts/vosk-runtime-vars.sh
          vosk_runtime_set_vars "${{ matrix.target }}"
          echo "basename=${VOSK_RUNTIME_BASENAME}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${VOSK_RUNTIME_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.runtime_vars.outputs.basename }}
          path: |
            dist/${{ steps.runtime_vars.outputs.basename }}.tar.gz
            dist/${{ steps.runtime_vars.outputs.basename }}.tar.gz.sha256
            dist/${{ steps.runtime_vars.outputs.basename }}.manifest.json
          if-no-files-found: error

      - name: Publish runtime assets to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.runtime_vars.outputs.release_tag }}"
          api="https://api.github.com/repos/${GH_REPO}"
          auth="Authorization: Bearer ${GITHUB_TOKEN}"
          basename="${{ steps.runtime_vars.outputs.basename }}"

          # Ensure the release exists
          if ! curl -sf -H "${auth}" "${api}/releases/tags/${tag}" >/dev/null 2>&1; then
            curl -sf -X POST -H "${auth}" -H "Content-Type: application/json" \
              "${api}/releases" \
              -d "$(jq -n --arg t "${tag}" --arg b "Reusable Vosk runtime artifacts for supported and compatibility-tested distro targets." \
                '{tag_name:$t, name:$t, body:$b}')"
          fi

          release=$(curl -sf -H "${auth}" "${api}/releases/tags/${tag}")
          upload_url=$(echo "${release}" | jq -r '.upload_url | sub("\\{\\?name,label\\}";"")')

          for suffix in .tar.gz .tar.gz.sha256 .manifest.json; do
            asset_name="${basename}${suffix}"
            asset_path="dist/${asset_name}"

            # Delete existing asset if present
            asset_id=$(echo "${release}" | jq -r --arg n "${asset_name}" '.assets[] | select(.name==$n) | .id // empty')
            if [ -n "${asset_id}" ]; then
              curl -sf -X DELETE -H "${auth}" "${api}/releases/assets/${asset_id}"
            fi

            case "${suffix}" in
              .tar.gz)        ct="application/gzip" ;;
              .tar.gz.sha256) ct="text/plain" ;;
              .manifest.json) ct="application/json" ;;
            esac

            curl -sf -X POST -H "${auth}" -H "Content-Type: ${ct}" \
              "${upload_url}?name=${asset_name}" \
              --data-binary "@${asset_path}"
          done
